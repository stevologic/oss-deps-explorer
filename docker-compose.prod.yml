# Production stack for https://ossde.dev
#
# Caddy terminates TLS and is the only service with published ports:
#   /api/*  -> api:8080
#   /*      -> ui:80 (static assets via nginx)
# Deploy and update with ./deploy.sh (safe to run from cron).

name: oss-deps-explorer

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - ui
    logging: *default-logging

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  ui:
    build: ./ui
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging: *default-logging

volumes:
  caddy_data:
  caddy_config:
